<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Appquarium TV</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <!-- Google Cast Receiver SDK — must load before any body scripts -->
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Appquarium</div>
      </div>
    </div>

    <!-- ── Cast Receiver bridge ───────────────────────────────────────────────
         Initialises the Cast SDK and routes custom-channel messages to Unity.
         Must run BEFORE the Unity loader so ctx.start() is called early.
         Unity-ready notification uses a global callback set here and called
         from the loader's .then() below — avoids the loader overwriting our
         createUnityInstance wrapper.
    ───────────────────────────────────────────────────────────────────────── -->
    <script>
    (function() {
      var NAMESPACE   = 'urn:x-cast:dev.unknownaerials.appquarium';
      var unityInst   = null;
      var pendingMsgs = [];

      var ctx = cast.framework.CastReceiverContext.getInstance();

      ctx.addCustomMessageListener(NAMESPACE, function(event) {
        var msg = typeof event.data === 'string' ? event.data : JSON.stringify(event.data);
        if (unityInst) {
          unityInst.SendMessage('CastReceiver', 'OnMessageReceived', msg);
        } else {
          pendingMsgs.push(msg);
        }
      });

      ctx.addEventListener(cast.framework.system.EventType.SENDER_CONNECTED, function(e) {
        console.log('[Cast] Sender connected: ' + e.senderId);
        if (unityInst) unityInst.SendMessage('CastReceiver', 'OnSenderConnected', e.senderId);
      });
      ctx.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, function(e) {
        console.log('[Cast] Sender disconnected: ' + e.senderId);
        if (unityInst) unityInst.SendMessage('CastReceiver', 'OnSenderDisconnected', e.senderId);
      });

      ctx.start({ disableIdleTimeout: true });
      console.log('[Cast] ctx.start() called');

      // Called by the Unity loader .then() once Unity is fully loaded.
      window.__castOnUnityReady = function(instance) {
        console.log('[Cast] Unity ready — flushing ' + pendingMsgs.length + ' buffered messages');
        unityInst = instance;
        pendingMsgs.forEach(function(m) {
          instance.SendMessage('CastReceiver', 'OnMessageReceived', m);
        });
        pendingMsgs = [];
      };
    })();
    </script>

    <!-- ── Unity loader ──────────────────────────────────────────────────── -->
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/webgl-build.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/webgl-build.data.unityweb",
        frameworkUrl: buildUrl + "/webgl-build.framework.js.unityweb",
        codeUrl: buildUrl + "/webgl-build.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Appquarium",
        productName: "Appquarium",
        productVersion: "1.0.1",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      function showError(msg) {
        // Technical error strip (always shown)
        var el = document.getElementById('tv-error');
        if (!el) {
          el = document.createElement('div');
          el.id = 'tv-error';
          el.style.cssText = 'position:fixed;bottom:0;left:0;width:100%;background:#c00;color:#fff;font:16px monospace;padding:12px 20px;z-index:9999;white-space:pre-wrap;word-break:break-all;';
          document.body.appendChild(el);
        }
        el.textContent = msg;
        console.error('[TV ERROR] ' + msg);

        // Friendly overlay for known WebGL 2 incompatibility
        if (msg.toLowerCase().indexOf('webgl 2') !== -1 || msg.toLowerCase().indexOf('webgl2') !== -1) {
          var overlay = document.createElement('div');
          overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#060D1A,#0F2235);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998;font-family:sans-serif;color:#DEEEE8;text-align:center;padding:60px;box-sizing:border-box;';
          overlay.innerHTML =
            '<div style="font-size:64px;margin-bottom:24px;">🐠</div>' +
            '<div style="font-size:36px;font-weight:bold;margin-bottom:16px;">Appquarium</div>' +
            '<div style="font-size:22px;color:#6A9888;max-width:700px;line-height:1.6;">' +
              'Este dispositivo no es compatible con el visor 3D.<br>' +
              'Para disfrutar el acuario en la TV, usa un<br>' +
              '<span style="color:#3BB8A0;font-weight:bold;">Chromecast con Google TV</span> o dispositivo similar.' +
            '</div>';
          document.body.appendChild(overlay);
        }
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onerror = function() { showError('FAILED TO LOAD: ' + loaderUrl); };
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
          console.log('[Unity] loading progress: ' + Math.round(progress * 100) + '%');
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
          // Notify Cast bridge that Unity is ready
          if (window.__castOnUnityReady) window.__castOnUnityReady(unityInstance);
        }).catch((message) => {
          showError('Unity load error:\n' + message);
        });
      };
      document.body.appendChild(script);
    </script>

  </body>
</html>
