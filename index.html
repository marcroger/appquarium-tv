<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Appquarium TV</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <!-- Google Cast Receiver SDK — must load before any body scripts -->
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Appquarium</div>
      </div>
    </div>

    <!-- ── WebGL 2 detection (must run first) ──────────────────────────────── -->
    <script>
      var hasWebGL2 = !!(document.createElement('canvas').getContext('webgl2'));
      console.log('[Appquarium] WebGL2 support: ' + hasWebGL2);
    </script>

    <!-- ── Cast bridge (shared by both receivers) ──────────────────────────── -->
    <script>
    (function() {
      var NAMESPACE   = 'urn:x-cast:dev.unknownaerials.appquarium';
      var unityInst   = null;
      var pendingMsgs = [];

      var ctx = cast.framework.CastReceiverContext.getInstance();

      ctx.addCustomMessageListener(NAMESPACE, function(event) {
        var raw = typeof event.data === 'string' ? event.data : JSON.stringify(event.data);
        console.log('[Cast] message received, type: ' + (tryParseType(raw)));

        if (!hasWebGL2) {
          // Route to Lite Receiver
          window.__liteOnMessage && window.__liteOnMessage(raw);
        } else if (unityInst) {
          unityInst.SendMessage('CastReceiver', 'OnMessageReceived', raw);
        } else {
          pendingMsgs.push(raw);
        }
      });

      ctx.addEventListener(cast.framework.system.EventType.SENDER_CONNECTED, function(e) {
        console.log('[Cast] Sender connected: ' + e.senderId);
        if (!hasWebGL2) window._dbgLog && window._dbgLog('Sender conectado: ' + e.senderId);
        if (unityInst) unityInst.SendMessage('CastReceiver', 'OnSenderConnected', e.senderId);
      });
      ctx.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, function(e) {
        console.log('[Cast] Sender disconnected: ' + e.senderId);
        if (unityInst) unityInst.SendMessage('CastReceiver', 'OnSenderDisconnected', e.senderId);
      });

      ctx.start({ disableIdleTimeout: true });
      console.log('[Cast] ctx.start() called — WebGL2: ' + hasWebGL2);

      // Unity-ready callback (WebGL 2 path only)
      window.__castOnUnityReady = function(instance) {
        console.log('[Cast] Unity ready — flushing ' + pendingMsgs.length + ' buffered messages');
        unityInst = instance;
        pendingMsgs.forEach(function(m) {
          instance.SendMessage('CastReceiver', 'OnMessageReceived', m);
        });
        pendingMsgs = [];
      };

      function tryParseType(raw) {
        try { return JSON.parse(raw).type; } catch(e) { return '?'; }
      }
    })();
    </script>

    <!-- ── Unity loader (WebGL 2 path only) ────────────────────────────────── -->
    <script>
    if (hasWebGL2) {
      var canvas = document.querySelector("#unity-canvas");

      function showError(msg) {
        var el = document.getElementById('tv-error');
        if (!el) {
          el = document.createElement('div');
          el.id = 'tv-error';
          el.style.cssText = 'position:fixed;bottom:0;left:0;width:100%;background:#c00;color:#fff;font:16px monospace;padding:12px 20px;z-index:9999;white-space:pre-wrap;word-break:break-all;';
          document.body.appendChild(el);
        }
        el.textContent = msg;
        console.error('[TV ERROR] ' + msg);

        if (msg.toLowerCase().indexOf('webgl 2') !== -1 || msg.toLowerCase().indexOf('webgl2') !== -1) {
          var overlay = document.createElement('div');
          overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#060D1A,#0F2235);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998;font-family:sans-serif;color:#DEEEE8;text-align:center;padding:60px;box-sizing:border-box;';
          overlay.innerHTML =
            '<div style="font-size:64px;margin-bottom:24px;">🐠</div>' +
            '<div style="font-size:36px;font-weight:bold;margin-bottom:16px;">Appquarium</div>' +
            '<div style="font-size:22px;color:#6A9888;max-width:700px;line-height:1.6;">' +
              'Este dispositivo no es compatible con el visor 3D.<br>' +
              'Para disfrutar el acuario en la TV, usa un<br>' +
              '<span style="color:#3BB8A0;font-weight:bold;">Chromecast con Google TV</span> o dispositivo similar.' +
            '</div>';
          document.body.appendChild(overlay);
        }
      }

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/webgl-build.loader.js";
      var config = {
        arguments:        [],
        dataUrl:          buildUrl + "/webgl-build.data.unityweb",
        frameworkUrl:     buildUrl + "/webgl-build.framework.js.unityweb",
        codeUrl:          buildUrl + "/webgl-build.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName:      "Appquarium",
        productName:      "Appquarium",
        productVersion:   "1.0.1",
        showBanner:       unityShowBanner,
      };

      canvas.style.width  = "960px";
      canvas.style.height = "600px";
      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src    = loaderUrl;
      script.onerror = function() { showError('FAILED TO LOAD: ' + loaderUrl); };
      script.onload  = function() {
        createUnityInstance(canvas, config, function(progress) {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
          console.log('[Unity] loading: ' + Math.round(progress * 100) + '%');
        }).then(function(unityInstance) {
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = function() {
            unityInstance.SetFullscreen(1);
          };
          if (window.__castOnUnityReady) window.__castOnUnityReady(unityInstance);
        }).catch(function(message) {
          showError('Unity load error:\n' + message);
        });
      };
      document.body.appendChild(script);
    }
    </script>

    <!-- ── Lite Receiver (WebGL 1 fallback — Chromecast Gen 3 etc.) ─────────── -->
    <script>
    if (!hasWebGL2) {
      // Hide Unity UI immediately
      document.querySelector('#unity-loading-bar').style.display = 'none';
      document.querySelector('#unity-footer').style.display = 'none';

      var LiteReceiver = (function() {

        // ── Constants ────────────────────────────────────────────────────────

        var RARITY_COLOR = {
          'Common':    '#8AB8C8',
          'Uncommon':  '#50C888',
          'Rare':      '#A082DC',
          'Epic':      '#F472B6',
          'Legendary': '#F0C060'
        };

        var SPECIES_RARITY = {
          'fish_banggai_cardinalfish':  'Common',
          'fish_boxfish_yellow':        'Common',
          'fish_goby_firefish':         'Common',
          'fish_black_durgon':          'Uncommon',
          'fish_filefish_orange':       'Uncommon',
          'fish_klunzinger_wrasse':     'Uncommon',
          'fish_soldierfish_redcoat':   'Uncommon',
          'fish_aweoweo':               'Uncommon',
          'fish_parrotfish':            'Rare',
          'fish_filefish_scrawled':     'Rare',
          'fish_angelfish_scribbled':   'Rare',
          'fish_angelfish_majestic':    'Rare',
          'fish_angelfish_blueface':    'Rare',
          'fish_angelfish_flagfin':     'Rare',
          'fish_angelfish_multibarred': 'Rare',
          'fish_moorish_idol':          'Epic',
          'fish_angelfish_goldflake':   'Epic',
          'fish_angelfish_blueline':    'Epic',
          'fish_angelfish_queensland':  'Epic',
          'fish_angelfish_clarion':     'Epic',
          'fish_angelfish_queen':       'Epic',
          'fish_angelfish_emperor':     'Epic',
          'fish_mandarinfish':          'Legendary',
          'fish_napoleon_wrasse':       'Legendary',
          'fish_sunfish_molamola':      'Legendary'
        };

        // Ambient sky / water gradient stops
        var AMBIENT = {
          'day':    { sky0: '#061828', sky1: '#0A3050', water: '#1A6080' },
          'sunset': { sky0: '#150810', sky1: '#3A1420', water: '#5A2830' },
          'night':  { sky0: '#010305', sky1: '#030A18', water: '#071428' }
        };

        // ── State ─────────────────────────────────────────────────────────────

        var cvs, c2d, W, H;
        var fish         = [];
        var ambientMode  = 'day';
        var speedMult    = 1.0;
        var feedTimer    = 0;
        var initialized  = false;
        var targetAmbient = 'day';
        var ambientBlend  = 1.0; // 0→1, lerp toward targetAmbient

        // ── Public: message entry point ───────────────────────────────────────

        function onMessage(raw) {
          try {
            var msg = JSON.parse(raw); // CastMessage { type, payload }
            var payload = JSON.parse(msg.payload);
            if (msg.type === 'INIT') {
              start(payload);
            } else if (msg.type === 'UPDATE') {
              applyUpdate(payload);
            }
          } catch(e) {
            console.error('[Lite] message parse error: ' + e);
          }
        }

        // ── Init ──────────────────────────────────────────────────────────────

        function start(state) {
          console.log('[Lite] INIT received — fish: ' + (state.activeFish || []).length);

          ambientMode   = state.ambientMode  || 'day';
          targetAmbient = ambientMode;
          speedMult     = state.fishSpeed    || 1.0;

          cvs = document.getElementById('unity-canvas');
          c2d = cvs.getContext('2d');

          function resize() {
            W = cvs.width  = window.innerWidth;
            H = cvs.height = window.innerHeight;
          }
          window.addEventListener('resize', resize);
          resize();

          // Spawn agents
          fish = [];
          (state.activeFish || []).forEach(function(f) {
            var rarity = SPECIES_RARITY[f.speciesId] || 'Common';
            var size   = ({ 'Legendary': 30, 'Epic': 26, 'Rare': 22, 'Uncommon': 18 })[rarity] || 16;
            fish.push({
              x:           W * (0.15 + Math.random() * 0.7),
              y:           H  * (0.25 + Math.random() * 0.5),
              vx:          (Math.random() - 0.5) * 1.4,
              vy:          (Math.random() - 0.5) * 0.6,
              wander:      Math.random() * Math.PI * 2,
              speciesId:   f.speciesId,
              nickname:    f.nickname || '',
              rarity:      rarity,
              color:       RARITY_COLOR[rarity] || '#8AB8C8',
              size:        size,
              labelAlpha:  0
            });
          });

          if (!initialized) {
            initialized = true;
            loop();
          }
        }

        function applyUpdate(msg) {
          if (msg.type === 'ambient') {
            targetAmbient = msg.value;
            ambientBlend  = 0;
          } else if (msg.type === 'speed') {
            speedMult = parseFloat(msg.value) || 1.0;
          } else if (msg.type === 'feed') {
            feedTimer = 180;
          }
        }

        // ── Rendering ─────────────────────────────────────────────────────────

        function lerpColor(a, b, t) {
          function hex(s) {
            s = s.replace('#','');
            return [parseInt(s.slice(0,2),16), parseInt(s.slice(2,4),16), parseInt(s.slice(4,6),16)];
          }
          var ca = hex(a), cb = hex(b);
          var r = Math.round(ca[0] + (cb[0]-ca[0])*t);
          var g = Math.round(ca[1] + (cb[1]-ca[1])*t);
          var bl= Math.round(ca[2] + (cb[2]-ca[2])*t);
          return 'rgb('+r+','+g+','+bl+')';
        }

        function drawBackground() {
          ambientBlend = Math.min(1, ambientBlend + 0.015);

          var ca = AMBIENT[ambientMode]  || AMBIENT['day'];
          var cb = AMBIENT[targetAmbient]|| AMBIENT['day'];
          var t  = ambientBlend;

          if (t >= 1) ambientMode = targetAmbient;

          var sky0  = lerpColor(ca.sky0,  cb.sky0,  t);
          var sky1  = lerpColor(ca.sky1,  cb.sky1,  t);
          var water = lerpColor(ca.water, cb.water, t);

          // Sky gradient
          var g = c2d.createLinearGradient(0, 0, 0, H);
          g.addColorStop(0,    sky0);
          g.addColorStop(0.45, sky1);
          g.addColorStop(1,    water);
          c2d.fillStyle = g;
          c2d.fillRect(0, 0, W, H);

          // Subtle light shafts
          var now = Date.now() * 0.0003;
          c2d.globalAlpha = (ambientMode === 'night' ? 0.025 : 0.04);
          for (var i = 0; i < 6; i++) {
            var sx = W * (0.1 + i * 0.16 + Math.sin(now + i) * 0.04);
            var sg = c2d.createLinearGradient(sx, 0, sx + 30, H * 0.8);
            sg.addColorStop(0, 'rgba(255,255,255,0.6)');
            sg.addColorStop(1, 'rgba(255,255,255,0)');
            c2d.fillStyle = sg;
            c2d.beginPath();
            c2d.moveTo(sx - 10, 0);
            c2d.lineTo(sx + 40, 0);
            c2d.lineTo(sx + 80, H * 0.8);
            c2d.lineTo(sx + 20, H * 0.8);
            c2d.closePath();
            c2d.fill();
          }
          c2d.globalAlpha = 1;
        }

        function drawBubbles() {
          var now = Date.now() * 0.001;
          c2d.globalAlpha = 0.18;
          c2d.strokeStyle = '#7CCCE0';
          c2d.lineWidth = 1;
          for (var i = 0; i < 10; i++) {
            var bx = W  * (0.05 + (Math.sin(now * 0.25 + i * 1.7) * 0.45 + 0.5) * 0.9);
            var by = H  - ((now * 28 * (0.4 + i * 0.12) + i * H * 0.1) % (H * 1.1));
            var br = 1.5 + (i % 4) * 0.8;
            c2d.beginPath();
            c2d.arc(bx, by, br, 0, Math.PI * 2);
            c2d.stroke();
          }
          c2d.globalAlpha = 1;
        }

        function drawFish(f) {
          var s = f.size;
          var flipped = f.vx < 0;

          c2d.save();
          c2d.translate(f.x, f.y);
          if (flipped) c2d.scale(-1, 1);

          // Tail
          c2d.beginPath();
          c2d.moveTo(-s * 0.75, 0);
          c2d.lineTo(-s * 1.35, -s * 0.52);
          c2d.lineTo(-s * 1.35,  s * 0.52);
          c2d.closePath();
          c2d.fillStyle = f.color;
          c2d.globalAlpha = 0.70;
          c2d.fill();

          // Body
          c2d.beginPath();
          c2d.ellipse(0, 0, s, s * 0.52, 0, 0, Math.PI * 2);
          c2d.fillStyle = f.color;
          c2d.globalAlpha = 0.88;
          c2d.fill();

          // Shimmer
          c2d.beginPath();
          c2d.ellipse(-s * 0.1, -s * 0.18, s * 0.38, s * 0.17, -0.25, 0, Math.PI * 2);
          c2d.fillStyle = 'rgba(255,255,255,0.28)';
          c2d.globalAlpha = 1;
          c2d.fill();

          // Eye
          c2d.beginPath();
          c2d.arc(s * 0.52, -s * 0.10, s * 0.13, 0, Math.PI * 2);
          c2d.fillStyle = '#0a0a14';
          c2d.fill();
          c2d.beginPath();
          c2d.arc(s * 0.54, -s * 0.12, s * 0.05, 0, Math.PI * 2);
          c2d.fillStyle = '#fff';
          c2d.fill();

          c2d.restore();

          // Label
          f.labelAlpha = Math.min(1, f.labelAlpha + 0.04);
          var label = f.nickname || formatName(f.speciesId);
          c2d.save();
          c2d.globalAlpha = f.labelAlpha * 0.80;
          c2d.font = 'bold ' + Math.round(s * 0.65) + 'px sans-serif';
          c2d.textAlign = 'center';
          c2d.shadowColor = '#000';
          c2d.shadowBlur  = 4;
          c2d.fillStyle   = f.color;
          c2d.fillText(label, f.x, f.y + s + Math.round(s * 0.65) + 2);
          c2d.restore();
        }

        function formatName(id) {
          if (!id) return '';
          return id.replace('fish_', '').replace(/_/g, ' ')
                   .replace(/\b\w/g, function(c) { return c.toUpperCase(); });
        }

        // ── Physics ───────────────────────────────────────────────────────────

        function updateFish(f) {
          var maxSpd = (1.3 + f.size * 0.02) * speedMult;

          // Wander force
          f.wander += (Math.random() - 0.5) * 0.12;
          f.vx += Math.cos(f.wander) * 0.07;
          f.vy += Math.sin(f.wander) * 0.035;

          // Feed: drift toward center-bottom
          if (feedTimer > 0) {
            var fx = W * 0.5 - f.x, fy = H * 0.6 - f.y;
            var fd = Math.sqrt(fx * fx + fy * fy) || 1;
            f.vx += (fx / fd) * 0.18;
            f.vy += (fy / fd) * 0.10;
          }

          // Wall repulsion
          var mg = 90;
          if (f.x < mg)       f.vx += (mg - f.x) * 0.012;
          if (f.x > W - mg)   f.vx -= (f.x - (W - mg)) * 0.012;
          if (f.y < H * 0.12) f.vy += 0.14;
          if (f.y > H * 0.88) f.vy -= 0.14;

          // Clamp speed + gentle Y damping (fish are mostly horizontal)
          f.vy *= 0.96;
          var spd = Math.sqrt(f.vx * f.vx + f.vy * f.vy);
          if (spd > maxSpd) { f.vx = f.vx / spd * maxSpd; f.vy = f.vy / spd * maxSpd; }
          if (spd < 0.25)   { f.vx *= 1.08; f.vy *= 1.08; }

          f.x += f.vx;
          f.y += f.vy;
          f.x  = Math.max(30, Math.min(W - 30, f.x));
          f.y  = Math.max(H * 0.10, Math.min(H * 0.90, f.y));
        }

        // ── Loop ─────────────────────────────────────────────────────────────

        function loop() {
          requestAnimationFrame(loop);
          if (!c2d) return;

          W = cvs.width;
          H = cvs.height;

          drawBackground();
          drawBubbles();

          if (feedTimer > 0) feedTimer--;

          // Sort by size so smaller fish render on top (depth feel)
          fish.slice().sort(function(a,b){ return b.size - a.size; })
              .forEach(function(f) { updateFish(f); drawFish(f); });

          // HUD
          c2d.globalAlpha = 0.35;
          c2d.font = '15px sans-serif';
          c2d.fillStyle = '#3BB8A0';
          c2d.textAlign = 'left';
          c2d.fillText('Appquarium  ·  ' + ambientMode + '  ·  ' + fish.length + ' peces', 20, H - 18);
          c2d.globalAlpha = 1;
          c2d.textAlign = 'left';
        }

        return { onMessage: onMessage };
      })();

      // Wire Cast bridge → Lite Receiver
      window.__liteOnMessage = function(raw) {
        LiteReceiver.onMessage(raw);
      };

      // ── Debug overlay (shown on TV screen — remove after debugging) ──────────
      var _dbgLines = ['Receiver cargado', 'Esperando sender...'];
      function _dbgLog(msg) {
        _dbgLines.push(msg);
        if (_dbgLines.length > 10) _dbgLines.shift();
        _dbgRedraw();
      }
      function _dbgRedraw() {
        var cvs = document.getElementById('unity-canvas');
        var c = cvs.getContext('2d');
        var g = c.createLinearGradient(0, 0, 0, cvs.height);
        g.addColorStop(0, '#061828'); g.addColorStop(1, '#0A3050');
        c.fillStyle = g; c.fillRect(0, 0, cvs.width, cvs.height);
        c.font = 'bold 28px sans-serif'; c.fillStyle = '#3BB8A0';
        c.textAlign = 'center';
        c.fillText('🐠  Conectando con Appquarium…', cvs.width/2, cvs.height*0.35);
        c.font = '20px monospace'; c.textAlign = 'left'; c.fillStyle = '#DEEEE8';
        _dbgLines.forEach(function(l, i) {
          c.fillText('• ' + l, 40, cvs.height*0.5 + i*30);
        });
      }

      // Show a "waiting for aquarium..." screen before INIT arrives
      (function() {
        var cvs = document.getElementById('unity-canvas');
        cvs.width  = window.innerWidth;
        cvs.height = window.innerHeight;
        _dbgRedraw();
      })();

      // Hook into Cast bridge for debug
      var _origLite = window.__liteOnMessage;
      window.__liteOnMessage = function(raw) {
        try {
          var t = JSON.parse(raw).type || '?';
          _dbgLog('MSG recibido: ' + t);
        } catch(e) { _dbgLog('MSG (parse err)'); }
        _origLite && _origLite(raw);
      };
    }
    </script>

  </body>
</html>
